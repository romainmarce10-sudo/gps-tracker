<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GPS Tracker Phone</title>
</head>
<body>
<h1>GPS Tracker – Phone</h1>
<script>
const ws = new WebSocket('wss://gps-tracker.onrender.com'); // <-- URL Render

function sendPosition(lat, lon){
    if(ws.readyState === WebSocket.OPEN){
        ws.send(JSON.stringify({
            id: 'MonTel',
            lat,
            lon,
            token: "SECRET123" // identifiant sécurisé
        }));
    }
}

navigator.geolocation.watchPosition(pos => {
    sendPosition(pos.coords.latitude, pos.coords.longitude);
});
</script>
</body>
</html>
